name: Process uploads

on:
  workflow_dispatch:

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Install 7z
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: harvester/requirements.txt

      - name: Install Python deps
        run: pip install -r harvester/requirements.txt

      - name: Process comics-source archives
        run: |
          shopt -s nullglob
          for f in comics-source/*.cbr comics-source/*.cbz comics-source/*.CBR comics-source/*.CBZ; do
            echo "Processing: $f"
            python harvester/harvest_local.py "$f"
          done
          echo "Done."

      - name: Commit static manifests
        run: |
          git config user.name "netcomix-bot"
          git config user.email "netcomix-bot@users.noreply.github.com"
          git add public/comics
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "scan: refresh comic manifests"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "push attempt $i failed, retrying..."
              sleep 3
            done
          fi
