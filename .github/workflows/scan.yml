name: Scan Drive

on:
  workflow_dispatch:
    inputs:
      folder_id:
        description: "Drive folder ID (overrides repo variable DRIVE_FOLDER_ID)"
        required: false
        type: string
      limit:
        description: "Optional cap — process only first N archives (proof-of-concept runs)"
        required: false
        type: string
        default: ""

concurrency:
  group: drive-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install unrar
        run: sudo apt-get update && sudo apt-get install -y unrar

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: harvester/requirements.txt

      - name: Install Python deps
        run: |
          pip install -r harvester/requirements.txt
          pip install google-api-python-client google-auth

      - name: Run drive harvester
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          DRIVE_FOLDER_ID: ${{ inputs.folder_id || vars.DRIVE_FOLDER_ID }}
          LIMIT: ${{ inputs.limit }}
        run: python harvester/harvest_drive.py

      - name: Commit static manifests
        run: |
          git config user.name "netcomix-bot"
          git config user.email "netcomix-bot@users.noreply.github.com"
          git add public/comics
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "scan: refresh comic manifests"
            git push
          fi
