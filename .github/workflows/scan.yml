name: Process uploads

on:
  workflow_dispatch:

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      actions: write
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y unar p7zip-full

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: harvester/requirements-scan.txt

      - name: Install Python deps
        run: pip install -r harvester/requirements-scan.txt

      - name: Reassemble chunked uploads
        run: |
          shopt -s nullglob
          for part1 in comics-source/*.part001; do
            [ -e "$part1" ] || continue
            base="${part1%.part001}"
            echo "Reassembling $(basename $base) ..."
            cat "$base".part* > "$base"
            echo "  -> $(du -h "$base" | cut -f1)"
          done

      - name: Process comics-source archives
        run: |
          shopt -s nullglob
          for f in comics-source/*.cbr comics-source/*.cbz comics-source/*.CBR comics-source/*.CBZ; do
            echo "Processing: $f"
            python harvester/harvest_local.py "$f"
          done
          echo "Done."

      - name: Commit static manifests
        run: |
          git config user.name "netcomix-bot"
          git config user.email "netcomix-bot@users.noreply.github.com"
          git rm --ignore-unmatch -q comics-source/*.part* 2>/dev/null || true
          git add public/comics
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "scan: refresh comic manifests"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "push attempt $i failed, retrying..."
              sleep 3
            done
          fi

      - name: Trigger GitHub Pages deploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'
          echo "Deploy workflow dispatched."
