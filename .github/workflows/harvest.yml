name: Harvest comics

on:
  push:
    branches: [main]
    paths:
      - "comics-source/**"
      - "harvester/**"
      - ".github/workflows/harvest.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (unrar for .cbr)
        run: sudo apt-get update && sudo apt-get install -y unrar

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: harvester/requirements.txt

      - name: Install Python deps
        run: pip install -r harvester/requirements.txt

      - name: Run harvester
        run: python harvester/harvest.py --source comics-source --output public/comics

      - name: Commit output
        run: |
          git config user.name "netcomix-harvester"
          git config user.email "actions@users.noreply.github.com"
          git add public/comics
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "harvest: regenerate library manifests"
            git push
          fi
