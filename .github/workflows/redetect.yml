name: Re-detect Panels

on:
  workflow_dispatch:
    inputs:
      issue_id:
        description: "Issue ID to re-detect (e.g. tales-from-the-crypt-v2-01-papercutz-2007-wildbluezero)"
        required: true
        type: string

concurrency:
  group: redetect-${{ inputs.issue_id }}
  cancel-in-progress: true

jobs:
  redetect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: harvester/requirements-scan.txt

      - name: Install Python deps
        run: pip install -r harvester/requirements-scan.txt

      - name: Re-detect panels
        run: python harvester/redetect_local.py "${{ inputs.issue_id }}"

      - name: Commit updated manifests
        run: |
          git config user.name "netcomix-bot"
          git config user.email "netcomix-bot@users.noreply.github.com"
          git add public/comics
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "redetect: update panels for ${{ inputs.issue_id }}"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              sleep 3
            done
          fi

      - name: Trigger deploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'
